<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rectangular Billiard (2 × 1)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
    }
    canvas {
        background: white;
        border: 1px solid #ccc;
        margin-top: 15px;
    }
    input {
        padding: 6px;
        margin: 5px;
        width: 200px;
    // Replace math keywords with JavaScript equivalents
    s = s.replace(/sqrt/g, "Math.sqrt");
    s = s.replace(/\bpi\b/g, "Math.PI");

    return Function('"use strict"; return (' + s + ')')();
}

function draw(points) {
        draw(result.pts);

        let text = "";
        text += "Rectangle: 2 × 1\n";
        text += "Start: (0.3, 0.4)\n";
        text += "Bounces simulated: " + result.bounces + "\n";

        if (result.corner)
            text += "⚠️ Hit a corner (reflection ambiguous).\n";

        if (result.returned)
            text += "✅ Closed orbit detected with period "
                    + result.bounces + " bounces.\n";
        else
            text += "— Did not return to start with same direction.\n";

        document.getElementById("output").textContent = text;

    } catch(e) {
        alert("Invalid slope expression.");
    }
}

runSimulation();
</script>

</body>
</html>
